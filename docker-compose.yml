version: '3.8'

services:

  db:
    image: mysql:8
    container_name: e_commerce_db
    environment:
      MYSQL_ROOT_PASSWORD: riteshsql@925
      MYSQL_DATABASE: e_commerce_db
    ports:
      - "3306:3306"

  app:
    build: .
    container_name: e_commerce_backend_system
    depends_on:
      - db
    ports:
      - "8080:8080"